<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 학생 페르소나 설정</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="persona-body">
<div style="margin-bottom: 20px; width: 100%; max-width: 1200px; padding-top: 20px;">
    <a href="index.html" class="back-link">⬅ 시뮬레이터로 돌아가기</a>
</div>

<div class="persona-container">
    <!-- 설문 조사 섹션 -->
    <div class="survey-section">
        <h1>학생 정의적 영역 설문</h1>
        <p id="surveyDesc" style="color: #7f8c8d; margin-bottom: 20px;">각 문항에 대해 1점(아니다)부터 3점(그렇다)까지 선택하여 학생의 성향을 디자인하세요.</p>
        
        <div class="character-selector" style="background: #E8F5E9; border-color: #C8E6C9; margin-bottom: 20px;">
            <label for="studentCountSelect"><strong>👥 참여할 모둠원 수 설정: </strong></label>
            <select id="studentCountSelect" onchange="localStorage.setItem('student_count', this.value); alert('모둠원 수가 ' + this.value + '명으로 설정되었습니다.\n메인 시뮬레이터 화면을 새로고침하면 적용됩니다.');">
                <option value="3">3명 (민준, 서연, 연우)</option>
                <option value="2">2명 (민준, 서연)</option>
                <option value="1">1명 (민준)</option>
            </select>
            <p style="font-size: 0.85rem; color: #2E7D32; margin-top: 8px; margin-bottom: 0;">※ 선택한 인원만큼만 시뮬레이션에 참여합니다.</p>
        </div>

        <div class="character-selector">
            <label for="targetCharacter"><strong>대상 모둠원 선택: </strong></label>
            <select id="targetCharacter">
                <option value="민준">민준 (기본: 오개념, 고집)</option>
                <option value="서연">서연 (기본: 모범생, 조력자)</option>
                <option value="연우">연우 (기본: 하위권, 의존적)</option>
                <option value="교사">교사 (기본: 친절한 안내자)</option>
            </select>
        </div>

        <div class="understanding-selector" id="understandingWrapper">
            <label for="understandingSlider"><strong>초기 개념 이해도: <span id="understandingValue">50</span>%</strong></label>
            <input type="range" id="understandingSlider" min="0" max="100" value="50">
            <p style="font-size: 0.85rem; color: #7f8c8d; margin-top: 5px;">0%에 가까울수록 오개념을 고집하고, 100%에 가까울수록 정답을 완벽히 이해한 상태로 시작합니다.</p>
        </div>

        <div id="questionsContainer"></div>
    </div>

    <!-- 생성된 프롬프트 미리보기 섹션 -->
    <div class="preview-section">
        <h2>페르소나 프롬프트 미리보기</h2>
        <p style="color: #7f8c8d; margin-bottom: 20px;">설문 결과에 따라 실시간으로 조합된 시스템 프롬프트입니다.</p>
        <textarea id="promptPreview" class="preview-box" readonly></textarea>
        <button class="btn-random" id="btnRandom">랜덤으로 성향 설정하기 🎲</button>
        <button class="btn-apply" id="btnSave">설정 저장 및 적용하기</button>
    </div>
</div>

<script type="module" src="/src/persona.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const countSelect = document.getElementById('studentCountSelect');
        if (countSelect) countSelect.value = localStorage.getItem('student_count') || '3';
    });
</script>

</body>
</html>
